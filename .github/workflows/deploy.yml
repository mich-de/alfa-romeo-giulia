# Workflow per il deploy automatico del progetto Vite + React su GitHub Pages
name: Deploy to GitHub Pages

on:
  # Esegui la build ogni volta che c'è un push sul branch principale (main)
  push:
    branches: ["main"]
  # Permette di runnare il workflow anche manualmente dal pannello GitHub
  workflow_dispatch:

# Permessi necessari per pubblicare su GH Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permette un solo deployment concorrente
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite fa l'export in questa cartella
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
