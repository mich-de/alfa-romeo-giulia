<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alfa Romeo Giulia — Wallpapers</title>
  <meta name="description" content="Album Wallpapers Alfa Romeo Giulia 2020." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: hsl(215, 90%, 38%);
      --blue-dark: hsl(215, 95%, 22%);
      --blue-light: hsl(215, 95%, 62%);
      --blue-glow: hsla(215, 90%, 38%, 0.45);
      --silver: hsl(210, 20%, 78%);
      --bg: hsl(218, 22%, 6%);
      --bg2: hsl(218, 20%, 9%);
      --bg3: hsl(218, 18%, 12%);
      --border: hsla(218, 50%, 50%, 0.16);
      --text: hsl(210, 20%, 93%);
      --text-muted: hsl(218, 15%, 62%);
      --text-dim: hsl(218, 12%, 44%);
      --glass-bg: hsla(218, 30%, 14%, 0.55);
      --glass-border: hsla(255, 100%, 100%, 0.08);
      --radius: 14px;
      --nav-h: 70px;
      --font-main: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      --red: var(--blue);
      --red-dark: var(--blue-dark);
      --gold: var(--silver);
    }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.65; padding-top: var(--nav-h); }
    #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: var(--nav-h); background: hsla(220, 18%, 7%, 0.92); backdrop-filter: blur(20px); box-shadow: 0 1px 0 var(--border); }
    .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 2rem; height: 100%; display: flex; align-items: center; gap: 2rem; }
    .nav-logo { display: flex; align-items: center; gap: 0.5rem; font-family: var(--font-main); font-weight: 700; font-size: 1.15rem; color: var(--text); text-decoration: none; }
    .logo-symbol { font-size: 1.6rem; color: var(--red); font-weight: 900; }
    .logo-text em { color: var(--red); font-style: normal; }
    .nav-link { display: block; padding: 0.45rem 0.9rem; border-radius: 8px; font-family: var(--font-main); font-size: 0.88rem; font-weight: 500; color: var(--text-muted); text-decoration: none; transition: color var(--transition), background var(--transition); }
    .nav-link:hover { color: var(--text); background: hsla(255, 100%, 100%, 0.06); }
    .section-header { text-align: center; margin-bottom: 3.5rem; }
    .section-eyebrow { display: inline-block; font-family: var(--font-main); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--red); margin-bottom: 0.75rem; }
    .section-title { font-family: var(--font-main); font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; color: var(--text); letter-spacing: -0.02em; margin-bottom: 0.75rem; }
    .section-sub { font-size: 0.95rem; color: var(--text-muted); max-width: 560px; margin: 0 auto; }
    .wallpapers-section { padding: 4rem 2rem; max-width: 1280px; margin: 0 auto; }
    .wallpapers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
    .wp-card { position: relative; border-radius: var(--radius); overflow: hidden; aspect-ratio: 16/10; background: var(--bg3); border: 1px solid var(--border); transition: var(--transition); cursor: pointer; }
    .wp-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .wp-overlay { position: absolute; inset: 0; background: linear-gradient(to top, hsla(220,18%,4%,0.9), hsla(220,18%,4%,0.3) 50%, transparent); opacity: 0; transition: var(--transition); display: flex; align-items: flex-end; justify-content: center; padding: 1.5rem; }
    .wp-card:hover { border-color: var(--blue); box-shadow: 0 4px 24px hsla(218, 80%, 65%, 0.15); }
    .wp-card:hover img { transform: scale(1.04); }
    .wp-card:hover .wp-overlay { opacity: 1; }
    .wp-btn { display: inline-block; padding: 0.6rem 1.4rem; background: var(--blue); color: #fff; border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 500; font-family: var(--font-main); transition: var(--transition); box-shadow: 0 2px 10px hsla(0,0%,0%,0.2); }
    .wp-btn:hover { background: var(--blue-light); transform: translateY(-2px); }
    .lightbox { position: fixed; inset: 0; z-index: 9000; background: hsla(220, 18%, 4%, 0.96); backdrop-filter: blur(24px); display: none; align-items: center; justify-content: center; }
    .lightbox.active { display: flex; }
    .lightbox-img-wrap { max-width: 90vw; max-height: 85vh; border-radius: var(--radius); overflow: hidden; box-shadow: 0 40px 100px hsla(0,0%,0%,0.6); }
    .lightbox-img-wrap img { max-width: 90vw; max-height: 85vh; object-fit: contain; display: block; }
    .lightbox-close { position: absolute; top: 1.5rem; right: 1.5rem; background: hsla(255,100%,100%,0.1); border: 1px solid var(--border); color: var(--text); width: 44px; height: 44px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .lightbox-close:hover { background: var(--red); border-color: var(--red); }
    .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: hsla(255,100%,100%,0.08); border: 1px solid var(--border); color: var(--text); width: 52px; height: 52px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); backdrop-filter: blur(8px); }
    .lightbox-nav:hover { background: var(--red); border-color: var(--red); }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }
    .lightbox-counter { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); font-family: var(--font-main); font-size: 0.82rem; color: var(--text-muted); letter-spacing: 0.1em; }
    #scrollTopBtn { position: fixed; bottom: 2rem; right: 2rem; z-index: 5000; width: 54px; height: 54px; border-radius: 50%; background: var(--glass-bg); color: #fff; border: 1px solid var(--glass-border); border-top: 1px solid hsla(255,100%,100%,0.15); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px hsla(0,0%,0%,0.4); backdrop-filter: blur(12px); opacity: 0; visibility: hidden; transform: translateY(20px); transition: all var(--transition); }
    #scrollTopBtn.visible { opacity: 1; visibility: visible; transform: translateY(0); }
    #scrollTopBtn:hover { background: var(--blue); border-color: var(--blue-light); transform: translateY(-5px); box-shadow: 0 12px 32px var(--blue-glow); }
  </style>
</head>
<body>
  <nav id="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="logo-symbol">α</span>
        <span class="logo-text">Giulia <em>2020</em></span>
      </a>
      <ul class="nav-links" style="margin-left:auto;list-style:none;display:flex;">
        <li><a href="/" class="nav-link">← Torna alla Home</a></li>
      </ul>
    </div>
  </nav>

  <section class="wallpapers-section">
    <div class="section-header">
      <span class="section-eyebrow">Download Collection</span>
      <h2 class="section-title">Wallpapers Esclusivi</h2>
      <p class="section-sub">Tutti gli sfondi in alta risoluzione della tua Alfa Romeo Giulia (desktop e mobile).</p>
    </div>
    <div class="wallpapers-grid" id="wpGrid"></div>
  </section>

  <section class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev">‹</button>
    <button class="lightbox-nav lightbox-next" id="lbNext">›</button>
    <div class="lightbox-img-wrap"><img id="lbImg" src="" alt="Wallpaper" /></div>
    <div class="lightbox-counter" id="lbCounter">1 / 9</div>
  </section>

  <button id="scrollTopBtn" title="Torna su" aria-label="Torna su">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
  </button>

  <script>
    const wpImages = [];
    for (let i = 1; i <= 9; i++) {
      const src = `wallpapers/wallapers_giulia_ (${i}).png`;
      wpImages.push({ src, alt: `Wallpaper Giulia ${i}` });
    }
    const grid = document.getElementById('wpGrid');
    wpImages.forEach((wp, idx) => {
      const card = document.createElement('div');
      card.className = 'wp-card';
      card.innerHTML = `<img src="${wp.src}" alt="${wp.alt}" loading="lazy" /><div class="wp-overlay"><a href="${wp.src}" download class="wp-btn">Scarica Sfondo ⬇</a></div>`;
      card.addEventListener('click', (e) => {
        if (e.target.tagName === 'A' || e.target.closest('a')) return;
        currentIdx = idx;
        updateLB();
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
      });
      grid.appendChild(card);
    });
    let currentIdx = 0;
    const lbImg = document.getElementById('lbImg');
    const lbCounter = document.getElementById('lbCounter');
    function updateLB() {
      lbImg.src = wpImages[currentIdx].src;
      lbImg.alt = wpImages[currentIdx].alt;
      lbCounter.textContent = `${currentIdx + 1} / ${wpImages.length}`;
    }
    document.getElementById('lbClose').addEventListener('click', () => { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; });
    document.getElementById('lbPrev').addEventListener('click', () => { currentIdx = (currentIdx - 1 + wpImages.length) % wpImages.length; updateLB(); });
    document.getElementById('lbNext').addEventListener('click', () => { currentIdx = (currentIdx + 1) % wpImages.length; updateLB(); });
    document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target === e.currentTarget) document.getElementById('lbClose').click(); });
    document.addEventListener('keydown', (e) => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape') document.getElementById('lbClose').click();
      if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
      if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
    });
    const stb = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => { stb.classList.toggle('visible', window.scrollY > 400); });
    stb.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });
  </script>
</body>
</html>
